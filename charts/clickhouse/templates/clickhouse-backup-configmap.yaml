{{- if and .Values.clickhouse.backup.enabled (not $.Values.clickhouse.backup.script.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickhouse.fullname" $ }}-backup-scripts
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  backup.sh: |
{{ .Files.Get "sources/backup.sh" | indent 4 }}
{{- end }}
